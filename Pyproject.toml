[project]
name = "fractals-project"
version = "0.1.0"
description = "Scientific project for fractal modeling using Python and Matplotlib"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "matplotlib>=3.9.0",
    "numpy>=2.0.0"
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"